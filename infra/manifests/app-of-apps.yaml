apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentflow-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR_GITHUB_USERNAME/agentflow.git'
    targetRevision: HEAD
    path: infra/manifests/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
