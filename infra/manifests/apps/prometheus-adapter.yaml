apiVersion: v1
kind: Namespace
metadata:
  name: custom-metrics
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-adapter
  namespace: custom-metrics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-metrics-config
  namespace: custom-metrics
data:
  config.yaml: |
    rules:
      - seriesQuery: 'agent_runtime_qps'
        resources:
          overrides:
            namespace:
              resource: namespace
        name:
          matches: 'agent_runtime_qps'
          as: 'agent_runtime_qps'
        metricsQuery: sum(rate(agent_runtime_qps[1m])) by (namespace)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-adapter
  namespace: custom-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-adapter
  template:
    metadata:
      labels:
        app: prometheus-adapter
    spec:
      serviceAccountName: prometheus-adapter
      containers:
      - name: prometheus-adapter
        image: quay.io/coreos/k8s-prometheus-adapter-amd64:v0.10.1
        args:
          - --config=/etc/adapter/config.yaml
        volumeMounts:
          - name: config
            mountPath: /etc/adapter
      volumes:
      - name: config
        configMap:
          name: custom-metrics-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-adapter
  namespace: custom-metrics
spec:
  selector:
    app: prometheus-adapter
  ports:
    - port: 443
      targetPort: 6443
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-adapter
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "namespaces", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["external.metrics.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-adapter
subjects:
- kind: ServiceAccount
  name: prometheus-adapter
  namespace: custom-metrics
roleRef:
  kind: ClusterRole
  name: prometheus-adapter
  apiGroup: rbac.authorization.k8s.io
