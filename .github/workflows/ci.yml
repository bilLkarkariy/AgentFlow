name: CI

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    # Use hosted Postgres via GitHub Secret, drop local Postgres service
    env:
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Debug POSTGRES_URL
        run: echo "POSTGRES_URL=$POSTGRES_URL"

      # Prepare pnpm via corepack (bundled with Node.js 20)
      - name: Prepare pnpm
        run: corepack enable && corepack prepare pnpm@8 --activate
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run all tests
        run: pnpm test -- --runInBand
