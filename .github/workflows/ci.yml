name: CI

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4

      # Prepare pnpm via corepack (bundled with Node.js 20)
      - name: Prepare pnpm via corepack
        run: corepack enable && corepack prepare pnpm@8 --activate
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      # Start docker-compose stack for integration tests
      - name: Start services
        run: docker-compose -f docker-compose.yml up -d postgres redis rabbitmq

      - name: Wait for services
        run: |
          until docker-compose exec -T postgres pg_isready -U postgres; do sleep 2; done
          until docker-compose exec -T redis redis-cli ping; do sleep 2; done

      - name: Lint
        run: pnpm lint

      - name: Build API
        working-directory: ./api
        run: pnpm run build

      - name: Build Frontend
        working-directory: ./web/dashboard
        run: pnpm run build

      - name: Run unit tests only (skip e2e)
        working-directory: api
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: pnpm exec jest --config jest-e2e.json --runInBand --testPathIgnorePatterns e2e