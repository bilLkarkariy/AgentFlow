name: CI Observability

on:
  push:
    branches: [main, dev]
    paths:
      - '.github/workflows/ci-observability.yml'
      - 'agent-runtime/**'
      - 'docker-compose.observability.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - '.github/workflows/ci-observability.yml'
      - 'agent-runtime/**'
      - 'docker-compose.observability.yml'
  workflow_run:
    workflows: ["ci-agent-runtime"]
    types: ["completed"]

jobs:
  observability-ci:
    runs-on: ubuntu-latest
    services:
      otel-collector:
        image: otel/opentelemetry-collector-contrib:0.69.0
        ports: ['4317:4317', '4318:4318']
      prometheus:
        image: prom/prometheus:latest
        ports: ['9090:9090']
      agent-runtime:
        image: ghcr.io/${{ github.repository_owner }}/agent-runtime:latest
        ports: ['8000:8000']
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
          OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://otel-collector:4318/v1/metrics
    steps:
      - name: Wait for OTel Collector metrics endpoint
        run: |
          until curl -s http://localhost:4318/metrics >/dev/null; do sleep 1; done
      - name: Wait for agent-runtime metrics
        run: |
          until curl -s http://localhost:8000/metrics >/dev/null; do sleep 1; done
      - name: Validate metrics
        run: |
          curl -s http://localhost:8000/metrics | grep http_server_duration_seconds
          curl -s http://localhost:8000/metrics | grep prompt_tokens_total
          curl -s http://localhost:8000/metrics | grep completion_tokens_total
          curl -s http://localhost:8000/metrics | grep price_usd_total
          curl -s http://localhost:8000/metrics | grep 'queue_length{queue="agent-run"}'
